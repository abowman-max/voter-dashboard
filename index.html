<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>TSS MIB Dashboard (Final)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f7f7f7}
.card{background:#fff;padding:16px;margin:16px;border-radius:12px}
#map{width:100%;height:560px}
.tooltip{position:fixed;background:#222;color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;pointer-events:none;display:none}
</style>
</head>
<body>
<div class="card">
<h2>TSS MIB Dashboard</h2>
<select id="dimension">
<option value="USC">Congressional</option>
<option value="STS">State Senate</option>
<option value="STH">State House</option>
</select>
<div id="map"></div>
</div>
<div id="tooltip" class="tooltip"></div>
<script>
const files={USC:"usc.geojson",STS:"sts.geojson",STH:"sth.geojson"};
async function draw(){
 const dim=document.getElementById("dimension").value;
 const geo=await fetch(files[dim]).then(r=>r.json());
 const el=document.getElementById("map"); el.innerHTML="";
 const w=el.clientWidth||900,h=560;
 const svg=d3.select(el).append("svg").attr("width","100%").attr("height",h);
 const proj=d3.geoMercator().fitSize([w,h],geo);
 const path=d3.geoPath().projection(proj);
 const tip=document.getElementById("tooltip");
 svg.selectAll("path").data(geo.features).enter().append("path")
  .attr("d",path).attr("fill","#b75b46").attr("stroke","#fff")
  .on("mousemove",(e,d)=>{
    tip.style.display="block";
    tip.style.left=(e.clientX+10)+"px";
    tip.style.top=(e.clientY+10)+"px";
    tip.innerHTML="District "+(d.properties.DISTRICT||"");
  })
  .on("mouseleave",()=>tip.style.display="none");
}
document.getElementById("dimension").addEventListener("change",draw);
draw();
</script>
</body>
</html>
